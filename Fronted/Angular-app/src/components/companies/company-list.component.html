<div class="container">
  <div class="header">
    <h2>רשימת חברות</h2>
  </div>
  <button class="btn-primary" (click)="goHome()">← חזרה</button>  

  <div *ngIf="loading" class="loading">טוען...</div>
  
  <div *ngIf="error" class="error">{{ error }}</div>

  <table *ngIf="!loading && companies.length > 0" class="table">
    <thead>
      <tr>
        <th>שם</th>
        <th>ח.פ/ע.מ</th>
        <th>טלפון</th>
        <th>אימייל</th>
        <th>כתובת</th>
        <th>פעולות</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let company of companies">
        <td>{{ company.name }}</td>
        <td>{{ company.taxId }}</td>
        <td>{{ company.phone || '-' }}</td>
        <td>{{ company.email || '-' }}</td>
        <td>{{ company.address || '-' }}</td>
        <td class="actions">
          <button (click)="viewCompanyTasks(company.id)" class="btn-view">משימות</button>
        

          <button
          *ngIf="auth.isAdmin()"
           (click)="editCompany(company.id)" class="btn-edit">ערוך</button>

          <button 
          *ngIf="auth.isAdmin()"
          (click)="deleteCompany(company.id)" class="btn-delete">מחק</button>
        </td>
      </tr>
    </tbody>
  </table>
<br>
  <button 
  (click)="addCompany()" class="btn-delete">הוספת חברה +</button>  
  <div *ngIf="!loading && companies.length === 0" class="no-data">
    אין חברות להצגה
  </div>
</div>
