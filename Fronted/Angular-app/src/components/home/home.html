<div class="home-container">
  <!-- Header -->
  <header class="header">
    <h1> מערכת ניהול חשבונות</h1>
  </header>

  <!-- Menu Cards -->
  <div class="menu-grid">
    
    <!-- כרטיס 1: חברות לפי עובדת -->
    <div class="menu-card" (click)="navigateToWorkerCompanies()">
      <div class="card-icon">👥</div>
      <h3>חברות</h3>
      <p>צפייה בכל החברות שלי</p>
      <button class="card-button">כניסה ←</button>
    </div>

    <!-- כרטיס 2: דוחות - ✅ פעיל! -->
    <div class="menu-card" (click)="navigateToReports()">
      <div class="card-icon">📊</div>
      <h3>דוחות</h3>
      <p>ניהול ומעקב אחר כל הדוחות</p>
      <button class="card-button">כניסה ←</button>
    </div>

    <!-- כרטיס 3: משימה עתידית -->
    <div class="menu-card disabled">
      <div class="card-icon">📈</div>
      <h3>סטטיסטיקות</h3>
      <p>בקרוב...</p>
      <button class="card-button" disabled>בקרוב</button>
    </div>

    <!-- כרטיס 4: משימה עתידית -->
    <div class="menu-card disabled">
      <div class="card-icon">⚙️</div>
      <h3>הגדרות</h3>
      <p>בקרוב...</p>
      <button class="card-button" disabled>בקרוב</button>
    </div>

  </div>

  <!-- Footer -->
  <footer class="footer">
    <p>מערכת ניהול חשבונות © 2025</p>
  </footer>
</div>
