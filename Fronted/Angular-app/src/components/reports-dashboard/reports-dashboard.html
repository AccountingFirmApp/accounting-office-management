<div class="reports-dashboard">
  <!-- Header -->
  <header class="dashboard-header">
    <div class="header-content">
      <!-- <app-back-button></app-back-button> -->
      <h1>
        ניהול דיווחים
        <!-- ← הצג את שם החברה אם מפולטר -->
        <span *ngIf="companyName" style="font-size: 0.7em; font-weight: 400; opacity: 0.9;">
          - {{ companyName }}
        </span>
      </h1>
      <button class="add-button" *ngIf="auth.isAdmin()"
       (click)="createNewReport()">
        + דיווח חדש
      </button>
    </div>
  </header>

  <!-- Statistics Cards -->
  <div class="stats-grid">
    <div class="stat-card pending">
      <div class="stat-content">
        <h3>ממתינים</h3>
        <p class="stat-number">{{ stats.pending }}</p>
      </div>
    </div>

    <div class="stat-card overdue">
      <div class="stat-content">
        <h3>באיחור</h3>
        <p class="stat-number">{{ stats.overdue }}</p>
      </div>
    </div>

    <div class="stat-card reported">
      <div class="stat-content">
        <h3>דווחו</h3>
        <p class="stat-number">{{ stats.reported }}</p>
      </div>
    </div>

    <div class="stat-card paid">
      <div class="stat-content">
        <h3>שולמו</h3>
        <p class="stat-number">{{ stats.paid }}</p>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="dashboard-content">
    <router-outlet></router-outlet>
  </div>
</div>
